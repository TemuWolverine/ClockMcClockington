#CONFIG START
substitutions:
  friendly_name: ClockMcClockington
  device_name: esp32s3zeroclockred
  weatherSensor : sensor.imelbo1140_temperature

  #Sound pins (I2S)
  speaker_i2s_lrclk_pin: GPIO13 #WS
  speaker_i2s_bclk_pin: GPIO11 #SCK
  speaker_i2s_dout_pin : GPIO12 #DIN

  mic_i2s_ws_pin: GPIO9 #lrclk
  mic_i2s_sck_pin: GPIO8 #bclk
  mic_i2s_din_pin : GPIO10  #SD

  #Display pins (I2C)
  mosiPin : GPIO07
  csPin : GPIO6
  clkPin :  GPIO05

  #light sensor pin
  ldr_pin: GPIO4
  
  #button pins
  button_one: GPIO13
  button_two: GPIO12
  button_three: GPIO11
  button_four: GPOI10

packages:
  esphome_templates:
    url: https://github.com/TemuWolverine/esphome_templates
    ref: main
    files:
      - esphome_boilerplate.yaml
      - boards/esp32_s3_zero.yaml
      - devices/ldr-GL5516.yaml
      - devices/i2s/INMP441.yaml
      - devices/i2s/MAX98357.yaml
      - devices/display/max7219.yaml

api:
  encryption:
    key: !secret home_assistant_api

#Fonts
font:
  - file: "fonts/5x7.bdf"
    id: DayFont
    glyphs:  |-
      ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567980°na?elo
  - file: "fonts/MatrixLight8X.bdf"
    id: TimeFont
    glyphs:  |-
      0123456789.: 

#global config
globals:
  - id: brightness
    type: int
    restore_value: no
    initial_value: '15'

  - id: page
    type: int
    initial_value: "1"

  - id: time_sync_done
    type: bool

time:
  - platform: homeassistant
    id: hass_time

  - platform: sntp
    id: sntp_time
    on_time_sync:
      then:
        lambda: |-
          id(time_sync_done) = true;

interval:
  - interval: 30s
    then:
      - lambda: |-
          if (id(page) == 1) {
            id(page) = 2;
          } else {
            id(page) = 1;
          }
sensor:
  - platform: homeassistant
    id: outside_temp
    entity_id: ${weatherSensor}

  - id: !extend ldr_light
    on_value_range:
      - below: 0.4
        then:
          - globals.set: 
              id: brightness
              value : "0"
      - above: 0.4
        below: 0.8
        then:
          - globals.set: 
              id: brightness
              value : "5"
      - above: 0.8
        below: 2.0
        then:
          - globals.set: 
              id: brightness
              value : "10"
      - above: 2
        then:
          - globals.set: 
              id: brightness
              value : "15"

media_player:
  - platform: speaker
    name: "Media Player"
    internal: False
    id: echo_media_player
    announcement_pipeline:
        speaker: i2s_speaker
        format: WAV
    codec_support_enabled: false
    buffer_size: 60000

# VOICE ASSIST STUFF 
select:
  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - if:
          condition:
            lambda: return x == "In Home Assistant";
          then:
            - micro_wake_word.stop:
            - delay: 500ms
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
      - if:
          condition:
            lambda: return x == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
            - delay: 500ms
            - micro_wake_word.start:
              
voice_assistant:
  id: va
  micro_wake_word:
  microphone:
    microphone: i2s_microphone
    channels: 0
    gain_factor: 4
  media_player: echo_media_player
  noise_suppression_level: 2
  auto_gain: 31dBFS
  on_listening: 
    then:
        - lambda: |-
            id(page) = 3;
  on_idle: 
    then:
        - lambda: |-
            id(page) = 1;
  on_end:
    # Handle the "nevermind" case where there is no announcement
  # - wait_until:
  #     condition:
  #       - media_player.is_announcing:
  #     timeout: 0.5s
  # # Restart only mWW if enabled; streaming wake words automatically restart
    - if:
        condition:
          - lambda: |-
              return id(wake_word_engine_location).current_option() == "On device";
        then:
          - wait_until:
              - and:
                  - not:
                      voice_assistant.is_running:
          - lambda: id(va).set_use_wake_word(false);
          - micro_wake_word.start:
          - lambda: |-
              id(page) = 1;
  on_stt_vad_end: 
    then:
        - lambda: |-
            id(page) = 1;
  on_client_connected:
    - delay: 2s  # Give the api server time to settle
    - script.execute: start_wake_word
  on_client_disconnected:
    - script.execute: stop_wake_word
  on_timer_finished:
    - script.execute: stop_wake_word
    - wait_until:
        not:
          microphone.is_capturing:
script: 
  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: |-
                  return id(wake_word_engine_location).current_option() == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: |-
                  return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: |-
                  return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: |-
              return id(wake_word_engine_location).current_option() == "On device";
          then:
            - micro_wake_word.stop:

micro_wake_word:
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;
  vad:
  models:
    - model: okay_nabu

display:
  - id: !extend led_display
    lambda: |-
        static bool clock_should_blink = true;

        auto time_str = id(hass_time).now().strftime("%a");
        switch (id(page))
        {
        case 1:
          std::transform(time_str.begin(), time_str.end(), time_str.begin(), ::toupper);
          

          {
            int hour12 = id(hass_time).now().hour % 12 == 0 ? 12 : id(hass_time).now().hour % 12;
            char hour_str[3];
            sprintf(hour_str, "%d", hour12);
            int text_width, text_height, x_offset, y_offset;
            it.get_text_bounds(0, 0, hour_str, id(TimeFont), TextAlign::TOP_LEFT, &x_offset, &y_offset, &text_width, &text_height);
            it.print(23 - text_width, 0, id(TimeFont), hour_str);
          }

          it.strftime(25, 0, id(TimeFont), "%M", id(hass_time).now());
          it.print(0, 2, id(DayFont), time_str.c_str());
          it.line(0, 0, 13, 0);

          if (clock_should_blink) {
            it.print(23, 0, id(TimeFont), ":");
          }
          break;
          
        case 2:

          std::transform(time_str.begin(), time_str.end(), time_str.begin(), ::toupper);

          {
            int hour12 = id(hass_time).now().hour % 12 == 0 ? 12 : id(hass_time).now().hour % 12;
            char hour_str[3];
            sprintf(hour_str, "%d", hour12);
            int text_width, text_height, x_offset, y_offset;
            it.get_text_bounds(0, 0, hour_str, id(TimeFont), TextAlign::TOP_LEFT, &x_offset, &y_offset, &text_width, &text_height);
            it.print(23 - text_width, 0, id(TimeFont), hour_str);
          }

          it.strftime(25, 0, id(TimeFont), "%M", id(hass_time).now());

          if (clock_should_blink) {
            it.print(23, 0, id(TimeFont), ":");
          }

          it.printf(0, 0, id(DayFont), "%g°", id(outside_temp).state);
          it.line(0, 7, 9, 7);
          break;

          case 3:
            it.print(8, 0, id(DayFont), "Hello?");
            break;
        }

        clock_should_blink = !clock_should_blink;
        it.intensity(id(brightness));

number:
  - platform: template
    name: "Clock Brightness Override"
    id: clock_brightness_override
    internal: false
    max_value: 15.0
    min_value: 0.0
    step: 1
    optimistic: true
    mode: slider
    on_value:
      then:
        - globals.set: 
            id: brightness
            value : !lambda "return x;"