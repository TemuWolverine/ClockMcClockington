esphome:
  name: clockmcclockington
  friendly_name: ClockMcClockington

# Begin configuration variables
esp32:
  board: lolin_s2_mini
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret home_assistant_api

ota:
  - platform: esphome
    password: !secret esphomeapi

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

#CONFIG START
substitutions:
  btnPlusPin:   GPIO6
  btnMinusPin:  GPIO7
  btnCirclePin:   GPIO8
  btnTrianglePin:  GPIO9
  
  csPin : GPIO34 #or GPIO10
  mosiPin : GPIO35 #or GPIO11
  clkPin :  GPIO36 #or GPIO12
  
binary_sensor:
  - platform: gpio
    pin: ${btnPlusPin}
    id: buttonPlus
    name: Clock Button +

    on_press: 
     then:
      - homeassistant.event:
            event: esphome.button_pressed
            data:        
              title: single_click_node1  

  - platform: gpio
    pin: ${btnMinusPin}
    name: Clock Button -
    id: buttonMinus

    on_press: 
     then:
      - homeassistant.event:
            event: esphome.button_pressed
            data:        
              title: single_click_node1  

#      - lambda: |-
#          id(page) = (id(page) + 1);
#          if (id(page) > 2) {
#            id(page) = 1;
#          }   

  - platform: gpio
    pin: ${btnCirclePin}
    name: Clock Button Triangle
    id: buttonTriangle

    on_press: 
     then:
      - homeassistant.event:
            event: esphome.button_pressed
            data:        
              title: single_click_node1  

  - platform: gpio
    pin: ${btnTrianglePin}
    name: Clock Button Circle
    id: buttonCircle

    on_press: 
     then:
      - homeassistant.event:
            event: esphome.button_pressed
            data:        
              title: single_click_node1  

#pin config
spi:
  clk_pin: ${clkPin}
  mosi_pin: ${mosiPin}

#global config
globals:
  - id: brightness
    type: int
    restore_value: no
    initial_value: '15'

  - id: page
    type: int
    initial_value: "1"

time:
  - platform: homeassistant
    id: hass_time

sensor:
  - platform: homeassistant
    id: outside_temp
    entity_id: sensor.imelbo1140_temperature  #this should probably be configurable from HA?

  - platform: adc
    name: light
    pin: GPIO17
    update_interval: 1s
    attenuation: 12dB

    on_value_range:
      - below: 0.6
        then:
          - globals.set: 
              id: brightness
              value : "0"
      - above: 0.6
        below: 1.0
        then:
          - globals.set: 
              id: brightness
              value : "5"
      - above: 1
        below: 2.0
        then:
          - globals.set: 
              id: brightness
              value : "10"
      - above: 2
        then:
          - globals.set: 
              id: brightness
              value : "15"

font:
  - file: "fonts/MatrixLight6X.bdf"
    id: DayFont
    glyphs:  |-
      ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567980°na 
  - file: "fonts/MatrixLight8X.bdf"
    id: TimeFont
    glyphs:  |-
      0123456789.:

#CONFIG END

# automations
display:
  - platform: max7219digit
    id: led_display
    cs_pin: ${csPin}
    num_chips: 4
    # time_str is the day of the week, then converted to uppercase as strftime has no way to do that natively?
    lambda: |-
        auto time_str = id(hass_time).now().strftime("%a");
        std::transform(time_str.begin(), time_str.end(), time_str.begin(), ::toupper);
        it.strftime(15, 0, id(TimeFont), "%I:%M", id(hass_time).now());

        switch (id(page))
        {
          case 1:
            it.print(0, 2, id(DayFont), time_str.c_str());
            it.line(0, 0, 11, 0);
            break;

          case 2:
            it.printf(0, 0, id(DayFont), "%g°", id(outside_temp).state);
            it.line(0, 7, 9, 7);
            break;
        }

        it.intensity(id(brightness));
        
# Manual override for the clocks brightness          
number:
  - platform: template
    name: "Clock Brightness Override"
    id: clock_brightness_override
    internal: false
    max_value: 15.0
    min_value: 0.0
    step: 1
    optimistic: true
    mode: slider
    on_value:
      then:
        - globals.set: 
            id: brightness
            value : !lambda "return x;"
